exporters:
    awscloudwatch:
        force_flush_interval: 1m0s
        max_datums_per_call: 1000
        max_values_per_datum: 150
        middleware: agenthealth/metrics
        namespace: CWAgent
        region: ap-southeast-2
        resource_to_telemetry_conversion:
            enabled: true
        rollup_dimensions:
            - - AutoScalingGroupName
              - InstanceId
            - - InstanceId
              - instance
              - objectname
            - - InstanceId
              - objectname
extensions:
    agenthealth/metrics:
        is_usage_data_enabled: true
        stats:
            operations:
                - PutMetricData
            usage_flags:
                mode: EC2
                region_type: EC2M
    agenthealth/statuscode:
        is_status_code_enabled: true
        is_usage_data_enabled: true
        stats:
            usage_flags:
                mode: EC2
                region_type: EC2M
    entitystore:
        mode: ec2
        region: ap-southeast-2
processors:
    awsentity/resource:
        entity_type: Resource
        platform: ec2
        scrape_datapoint_attribute: true
    awsentity/service/telegraf:
        entity_type: Service
        platform: ec2
        scrape_datapoint_attribute: true
    ec2tagger:
        ec2_instance_tag_keys:
            - AutoScalingGroupName
        ec2_metadata_tags:
            - InstanceId
        imds_retries: 1
        middleware: agenthealth/statuscode
        refresh_tags_interval: 0s
        refresh_volumes_interval: 0s
receivers:
    telegraf_statsd:
        collection_interval: 1m0s
        initial_delay: 1s
        timeout: 0s
    telegraf_win_perf_counters/1063858558:
        alias_name: Network Interface
        collection_interval: 1m0s
        initial_delay: 1s
        timeout: 0s
    telegraf_win_perf_counters/1492679118:
        alias_name: Memory
        collection_interval: 1m0s
        initial_delay: 1s
        timeout: 0s
    telegraf_win_perf_counters/3762679655:
        alias_name: Processor
        collection_interval: 1m0s
        initial_delay: 1s
        timeout: 0s
    telegraf_win_perf_counters/4283769065:
        alias_name: LogicalDisk
        collection_interval: 1m0s
        initial_delay: 1s
        timeout: 0s
service:
    extensions:
        - agenthealth/metrics
        - agenthealth/statuscode
        - entitystore
    pipelines:
        metrics/host:
            exporters:
                - awscloudwatch
            processors:
                - ec2tagger
                - awsentity/resource
            receivers:
                - telegraf_win_perf_counters/1063858558
                - telegraf_win_perf_counters/3762679655
                - telegraf_win_perf_counters/4283769065
                - telegraf_win_perf_counters/1492679118
        metrics/hostCustomMetrics:
            exporters:
                - awscloudwatch
            processors:
                - ec2tagger
                - awsentity/service/telegraf
            receivers:
                - telegraf_statsd
    telemetry:
        logs:
            encoding: console
            level: info
            output_paths:
                - C:\ProgramData\Amazon\AmazonCloudWatchAgent\Logs\amazon-cloudwatch-agent.log
            sampling:
                enabled: true
                initial: 2
                thereafter: 500
                tick: 10s
        metrics:
            level: None
        traces:
            level: None
