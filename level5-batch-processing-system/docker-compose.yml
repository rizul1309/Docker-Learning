# ============================================================
# LEVEL 5 — Full Batch Processing System
# ============================================================
# 7 services: nginx, api, worker, ui, db, redis, rabbitmq
#
# This mirrors your company's batch-processing-service architecture
# but runs entirely locally with no company dependencies.
# ============================================================

services:

  # ---------- NGINX (Reverse Proxy + UI Router) ----------
  nginx:
    image: nginx:alpine
    ports:
      - "8080:80"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
    depends_on:
      api:
        condition: service_healthy
      ui:
        condition: service_started
    restart: unless-stopped
    networks:
      - frontend

  # ---------- .NET API ----------
  api:
    build:
      context: .
      dockerfile: Dockerfile.api
    environment:
      - ConnectionStrings__BatchDb=Host=db;Database=batchprocessing;Username=batchuser;Password=batchpass
      - Redis__ConnectionString=redis:6379
      - RabbitMQ__Host=rabbitmq
      - ASPNETCORE_URLS=http://+:8080
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8080/health"]
      interval: 15s
      timeout: 3s
      retries: 5
      start_period: 20s
    networks:
      - frontend
      - backend
    deploy:
      resources:
        limits:
          cpus: '0.50'
          memory: 256M

  # ---------- BACKGROUND WORKER ----------
  worker:
    build:
      context: .
      dockerfile: Dockerfile.worker
    environment:
      - RABBITMQ_HOST=rabbitmq
    depends_on:
      rabbitmq:
        condition: service_healthy
    restart: unless-stopped
    networks:
      - backend
    deploy:
      resources:
        limits:
          cpus: '0.25'
          memory: 128M

  # ---------- REACT UI ----------
  ui:
    build:
      context: ./src/ui
      dockerfile: Dockerfile
    restart: unless-stopped
    networks:
      - frontend

  # ---------- POSTGRESQL ----------
  db:
    image: postgres:16-alpine
    ports:
      - "5433:5432"
    environment:
      - POSTGRES_USER=batchuser
      - POSTGRES_PASSWORD=batchpass
      - POSTGRES_DB=batchprocessing
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U batchuser -d batchprocessing"]
      interval: 5s
      timeout: 3s
      retries: 5
    restart: unless-stopped
    networks:
      - backend
    deploy:
      resources:
        limits:
          cpus: '0.50'
          memory: 512M

  # ---------- REDIS ----------
  redis:
    image: redis:7-alpine
    command: redis-server --maxmemory 64mb --maxmemory-policy allkeys-lru
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 3
    restart: unless-stopped
    networks:
      - backend
    deploy:
      resources:
        limits:
          cpus: '0.25'
          memory: 128M

  # ---------- RABBITMQ ----------
  rabbitmq:
    image: rabbitmq:3-management-alpine
    ports:
      - "15672:15672"
    environment:
      - RABBITMQ_DEFAULT_USER=guest
      - RABBITMQ_DEFAULT_PASS=guest
    volumes:
      - rabbitmq-data:/var/lib/rabbitmq
    healthcheck:
      test: ["CMD", "rabbitmq-diagnostics", "-q", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s
    restart: unless-stopped
    networks:
      - backend
    deploy:
      resources:
        limits:
          cpus: '0.50'
          memory: 512M

networks:
  frontend:
  backend:

volumes:
  pgdata:
  rabbitmq-data:
