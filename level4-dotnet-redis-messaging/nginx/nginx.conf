# ============================================================
# NGINX CONFIG — Reverse Proxy for .NET API
# ============================================================
# Same concept as Level 3, but pointing to the .NET API on port 8080
# (.NET 8 defaults to 8080, unlike Flask's 5000).
# ============================================================

upstream dotnet_api {
    # "api" = Docker Compose service name → Docker DNS resolves it
    # Port 8080 = .NET 8's default HTTP port
    server api:8080;

    # If you scale the API: docker compose up --scale api=3
    # Nginx will round-robin across all 3 instances automatically.
    # Docker DNS returns all container IPs for the "api" service name.
}

server {
    listen 80;
    server_name _;

    # ---- Proxy to .NET API ----
    location / {
        proxy_pass http://dotnet_api;
        proxy_http_version 1.1;

        # Pass original client info to the .NET app
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        # WebSocket support (needed if you add SignalR later)
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
    }

    # ---- Security Headers ----
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-XSS-Protection "1; mode=block" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
}
