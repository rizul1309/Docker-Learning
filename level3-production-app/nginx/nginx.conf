# Nginx sits between the internet and your Flask app.
# Think of it as a bouncer — it decides what gets through and how.

events {
    worker_connections 1024;
}

http {
    # ---------- Security Headers ----------
    # These protect against common web attacks

    add_header X-Frame-Options "SAMEORIGIN" always;          # Prevents clickjacking
    add_header X-Content-Type-Options "nosniff" always;      # Prevents MIME sniffing
    add_header X-XSS-Protection "1; mode=block" always;      # XSS protection

    # ---------- Upstream (where to forward requests) ----------
    # "web" is the Docker service name — Docker DNS resolves it
    upstream flask_app {
        server web:5000;

        # If you had multiple Flask containers (scaling), you'd list them:
        # server web_1:5000;
        # server web_2:5000;
        # server web_3:5000;
        # Nginx would load-balance across them automatically
    }

    server {
        listen 80;
        server_name localhost;

        # ---------- Proxy to Flask ----------
        location / {
            proxy_pass http://flask_app;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;

            # These headers tell Flask the REAL client IP,
            # not nginx's internal IP
        }

        # ---------- Health check for nginx itself ----------
        location /nginx-health {
            return 200 'ok';
            add_header Content-Type text/plain;
        }
    }
}
